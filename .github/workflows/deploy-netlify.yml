name: Render and Deploy Quarto to Netlify

on:
  push:
    branches: [main] # Triggers whenever you push changes to your main branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0" # Matches your capstone environment version

      - name: Set up renv (Restores packages from your renv.lock)
        uses: r-lib/actions/setup-renv@v2

      - name: Set up Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto Blog
        run: |
          quarto render stats/ --to html --no-cache

      - name: Deploy to Netlify 🚀
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./stats/_site" # Points directly to your output-dir configuration
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
